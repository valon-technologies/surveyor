table: interest_rate_buydown_loan_info
version: 1
primary_key: [interest_rate_buydown_loan_info_id]

sources:
- name: LoanInfo
  alias: li
  pipe_file: {table: "LoanInfo"}
  dtypes:
    PaymentSubsidyAmount1: "float"
    PaymentSubsidyAmount2: "float"
    PaymentSubsidyAmount3: "float"
    FirstPrincipalBalance: "float"
    SubsidyPeriod1Term: "int"
  filters:
  - column: PaymentSubsidyAmount1
    operator: "gt"
    value: 0

- name: EventDates
  alias: ed
  pipe_file: {table: "EventDates"}

- name: loan_staging
  alias: l
  staging: {table: "loan"}

joins:
- left: {source: li}
  right: {source: l}
  'on': [li.LoanNumber == l.loan_number]
  how: left

- left: {source: li}
  right: {source: ed}
  'on': [li.LoanNumber == ed.LoanNumber]
  how: left

columns:
- target_column: interest_rate_buydown_loan_info_id
  hash_columns:
  - l.loan_id
  - '"INTEREST_RATE_BUYDOWN_LOAN_INFO"'
  transform: hash_id
  dtype: string

- target_column: interest_rate_percent_increase
  expression: ((li.PaymentSubsidyAmount1 - li.PaymentSubsidyAmount2) / li.FirstPrincipalBalance) * 12
  transform: expression
  dtype: float

- target_column: is_buydown_subsidy_temporary
  source: {literal: "True"}
  transform: literal
  dtype: string

- target_column: plan_start_date
  source: ed.FirstSubsidyDueDate
  transform: identity
  dtype: date

- target_column: rate_change_frequency_months
  source: li.SubsidyPeriod1Term
  transform: identity
  dtype: int

- target_column: monthly_payment_amount_discount_1
  source: li.PaymentSubsidyAmount1
  transform: identity
  dtype: float

- target_column: monthly_payment_amount_discount_2
  source: li.PaymentSubsidyAmount2
  transform: identity
  dtype: float

- target_column: monthly_payment_amount_discount_3
  source: li.PaymentSubsidyAmount3
  transform: identity
  dtype: float

- target_column: loan_id
  source: l.loan_id
  transform: identity
  dtype: string

entity:
  entity_type: "interest_rate_buydown_loan_info"
  entity_id_col: "interest_rate_buydown_loan_info_id"
  loan_id_col: "loan_id"
  loan_id_col_required: true
