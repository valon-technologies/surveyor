table: address_seasonal
version: 1

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left
      
columns:
  - target_column: address_id
    expression: |
      hash_address_id(
        "ACDC",
        li.SeasonalAddressLine4.str.strip(),
        li.SeasonalAddressLine3.str.strip(), 
        li.SeasonalAddressCityName.str.strip(), 
        li.SeasonalAddressState.str.strip(), 
        li.SeasonalAddressZipCode.fillna('').astype(str).str.replace('nan', '').str.slice(0, 5).str.zfill(5).replace('00000', '').str.strip()
      )
    transform: expression
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

  - target_column: city
    expression: li.SeasonalAddressCityName.str.strip()
    transform: expression
    dtype: string

  - target_column: county
    source: []
    transform: null
    dtype: string

  - target_column: state
    expression: li.SeasonalAddressState.str.strip()
    transform: expression
    dtype: string

  - target_column: street_address_1
    expression: li.SeasonalAddressLine4.str.strip()
    transform: expression
    dtype: string

  - target_column: street_address_2
    expression: li.SeasonalAddressLine3.str.strip()
    transform: expression
    dtype: string

  - target_column: zip_code
    expression: li.SeasonalAddressZipCode.fillna('').astype(str).str.replace('nan', '').str.slice(0, 5).str.zfill(5).replace('00000', '').str.strip()
    transform: expression
    dtype: string