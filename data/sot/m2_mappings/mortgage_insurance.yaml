table: mortgage_insurance
version: 1
primary_key: [mortgage_insurance_id]

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
    filters:
      - column: "MiCertificateNumberExp"
        operator: "is_not_null"
      - column: "MiCompanyCodeExp"
        operator: "not_in"
        value: ["904", "905"]
  - name: EventDates
    alias: ed
    pipe_file: {table: "EventDates"}
  - name: StopsFlagsAndIndicators
    alias: fi
    pipe_file: {table: "StopsFlagsAndIndicators"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: mortgage_insurance_company_staging
    alias: mic
    staging: {table: "mortgage_insurance_company"}

joins:
  - left: {source: li}
    right: {source: ed}
    "on": ["li.LoanNumber == ed.LoanNumber"]
    how: left
  - left: {source: li}
    right: {source: fi}
    "on": ["li.LoanNumber == fi.LoanNumber"]
    how: left
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left
  - left: {source: li}
    right: {source: mic}
    "on": ["l.loan_id == mic.loan_id"]
    how: left

columns:
  - target_column: mortgage_insurance_id
    hash_columns: ["ed.LoanNumber", "l.loan_id", "mic.mortgage_insurance_company_id", "mortgage_insurance"]
    transform: hash_id
    dtype: string

  - target_column: activated_at
    source: ed.MipPendingAnniversaryDate
    transform: identity
    dtype: datetime

  - target_column: auto_termination_date
    source: ed.MiTerminationDate
    transform: identity
    dtype: date

  - target_column: certificate_number
    source: li.MiCertificateNumberExp
    transform: identity
    dtype: string

  - target_column: coverage_percent
    expression: pd.to_numeric(li.PrimaryMiCoverageFactor, errors="coerce") / 100.0
    transform: expression
    dtype: float

  - target_column: cancelled_date
    source: ed.MiDeletionDate
    transform: identity
    dtype: date

  - target_column: insurance_type
    expression: |
      np.select(
        condlist=[
          fi.LoType == "3",
          fi.LoType == "6",
          fi.LoType == "9"
        ],
        choicelist=[
          "PRIVATE_MORTGAGE_INSURANCE",
          "PRIVATE_MORTGAGE_INSURANCE",
          "USDA_FEE"
        ],
        default=pd.NA
      )
    transform: expression
    dtype: string

  - target_column: midpoint_date
    source: ed.MiMidPointDate
    transform: identity
    dtype: date

  - target_column: payment_source
    expression: | 
      np.select(
        condlist=[
          fi.MiPaidByLenderCode == "L",
          fi.MiPaidByLenderCode == "Z"
        ],
        choicelist=[
          "LENDER",
          "LENDER"
        ],
        default="BORROWER"
      )
    transform: expression
    dtype: string

  - target_column: premium_deferral
    source: {literal: "False"}
    transform: literal
    dtype: boolean

  - target_column: premium_plan_type
    expression: |
     np.select(
        condlist=[
          (pd.to_numeric(li.MipUpfrontPremiumAmount, errors="coerce").fillna(0) > 0) &
          (pd.to_numeric(li.MiMonthlyAmount, errors="coerce").fillna(0) > 0),

          (pd.to_numeric(li.MipUpfrontPremiumAmount, errors="coerce").fillna(0) > 0) &
          (pd.to_numeric(li.MiMonthlyAmount, errors="coerce").fillna(0) == 0),

          (pd.to_numeric(li.MipUpfrontPremiumAmount, errors="coerce").fillna(0) == 0) &
          (pd.to_numeric(li.MiMonthlyAmount, errors="coerce").fillna(0) > 0),

          (pd.to_numeric(li.MipUpfrontPremiumAmount, errors="coerce").fillna(0) == 0) &
          (pd.to_numeric(li.MiMonthlyAmount, errors="coerce").fillna(0) == 0)
        ],
        choicelist=[
          "SPLIT",
          "SINGLE",
          "RENEWAL",
          pd.NA
        ],
        default="INVALID"
      )
    transform: expression
    dtype: string

  - target_column: refund_policy
    expression: |
      np.select(
        condlist=[
          fi.PmiPremiumRefundIndicator == "Y",
          fi.PmiPremiumRefundIndicator == "N"
        ],
        choicelist=[
          "REFUNDABLE",
          "NOT_REFUNDABLE"
        ],
        default=pd.NA
      )
    transform: expression
    dtype: string

  - target_column: renewal_frequency
    expression: | 
      li.MiTerm.map({
        "12": "ANNUAL",
        "1": "MONTHLY",
        "0": pd.NA
      })
    transform: expression
    dtype: string

  - target_column: renewal_rate_1
    source: li.PmiRate
    transform: identity
    dtype: float

  - target_column: renewal_rate_2
    source: []
    transform: null
    dtype: float

  - target_column: renewal_rate_3
    source: []
    transform: null
    dtype: float

  - target_column: renewal_type
    expression: |
      np.select(
        condlist=[
          fi.LoType == "3",
          fi.LoType == "6",
          fi.LoType == "9"
        ],
        choicelist=[
          "CONSTANT",
          "CONSTANT",
          "DECLINING"
        ],
        default=pd.NA
      )
    transform: expression
    dtype: string

  - target_column: certificate_status
    expression: np.where(li.PmiCancellationReasonCode.isna(), "ACTIVATED", "CANCELLED")
    transform: expression
    dtype: string

  - target_column: termination_reason
    expression: |
     li.PmiCancellationReasonCode.map({
        "1M": "PMI Cancelled based on LTOV",
        "1N": "PMI Cancelled based on LTCV",
        "1O": "PMI Auto Cancel Term or Midpoint",
        "1P": "PMI Rescinded by MI Company"
      })
    transform: expression
    dtype: string

  - target_column: upfront_fee_percent
    expression: pd.to_numeric(li.MipUpfrontPremiumAmount, errors="coerce") / pd.to_numeric(li.OriginalMortgageAmount, errors="coerce")
    transform: expression
    dtype: float

  - target_column: mortgage_insurance_company_id
    source: mic.mortgage_insurance_company_id
    transform: identity
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "mortgage_insurance"
  entity_id_col: "mortgage_insurance_id"
  loan_id_col: "loan_id"
  loan_id_col_required: true

