table: non_borrower_loan_organization
version: 1
primary_key: [non_borrower_loan_organization_id]

sources:
  - name: NonBorrower
    alias: nb
    pipe_file: {table: "NonBorrower"}
    filters:
      - column: "NonborrowerType"
        operator: "in"
        value: ["TL", "LT"]
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: address_nb_org
    alias: a
    staging: {table: "address_nb_org"}

joins:
  - left: {source: nb}
    right: {source: l}
    "on": ["nb.LoanNumber == l.loan_number"]
    how: left
  - left: {source: nb}
    right: {source: a}
    "on": 
      - "l.loan_id == a.loan_id"
      - "nb.NbLastName == a.name"
    how: left

columns:
  - target_column: non_borrower_loan_organization_id
    hash_columns: ["nb.LoanNumber", "l.loan_id", "nb.NonborrowerTypeDescription", "nb.NbFirstName", "nb.NbLastName", "nb.NonborrowerSsnTinNumber", "non_borrower_loan_organization"]
    transform: hash_id
    dtype: string

  - target_column: mailing_address_id
    source: a.address_id
    transform: identity
    dtype: string

  - target_column: email_address
    source: nb.NonborrowerEmail1Address
    transform: identity
    dtype: string

  - target_column: name
    source: nb.NbLastName
    transform: identity
    dtype: string

  - target_column: organization_type
    expression: |
      nb.NonborrowerType.map({
        "TL": "LLC",
        "LT": "TRUST"
      })
    transform: expression
    dtype: string

  - target_column: phone_number
    source: nb.NonborrowerPhone1Number
    transform: identity
    dtype: string

  - target_column: tax_id_number
    source: nb.NonborrowerSsnTinNumber
    transform: identity
    dtype: string

  - target_column: tax_id_type
    expression: |
      np.where(nb.NonborrowerSsnTinNumber.notna(), "EIN", pd.NA)
    transform: expression
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "non_borrower_loan_organization"
  entity_id_col: "non_borrower_loan_organization_id"
  loan_id_col: "loan_id"
  loan_id_col_required: true

