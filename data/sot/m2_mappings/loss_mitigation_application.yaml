table: loss_mitigation_application
version: 1
primary_key: [loss_mitigation_application_id]

sources:
  - name: Step
    alias: s
    pipe_file: {table: "Step"}
    filters:
      - column: "Workstation"
        operator: "eq"
        value: "LSMT"
    pivot:
      pivot_index: ["LoanNumber"]
      pivot_columns: ["StepCode"]
      pivot_values: ["ActualCompletionDate", "ScheduledCompletionDate"]
  - name: StopsFlagsAndIndicators
    alias: fi
    pipe_file: {table: "StopsFlagsAndIndicators"}
  - name: DefaultWorkstations
    alias: dw
    pipe_file: {table: "DefaultWorkstations"}
    filters:
      - column: "LossMitStatusCode"
        operator: "is_not_null"
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: s}
    right: {source: l}
    "on": ["s.LoanNumber == l.loan_number"]
    how: left
  - left: {source: s}
    right: {source: fi}
    "on": ["s.LoanNumber == fi.LoanNumber"]
    how: left
  - left: {source: s}
    right: {source: dw}
    "on": ["s.LoanNumber == dw.LoanNumber"]
    how: left

columns:
  - target_column: loss_mitigation_application_id
    hash_columns: ["l.loan_id", "s.LoanNumber", "s.ScheduledCompletionDate_L01", "loss_mitigation_application"]
    transform: hash_id
    dtype: string

  # - target_column: borrower_property_intention
  #   source: []
  #   transform: null
  #   dtype: string

  # - target_column: cancelled_date
  #   source: []
  #   transform: null
  #   dtype: date

  - target_column: completed_date
    expression: |
      s.ActualCompletionDate_L14.fillna(s.ActualCompletionDate_L16).fillna(s.ActualCompletionDate_L93)
    transform: expression
    dtype: date

  # - target_column: hoa_fee
  #   source: []
  #   transform: null
  #   dtype: float

  - target_column: number_of_units
    source: fi.NumberOfUnits
    transform: identity
    dtype: float
  
  - target_column: property_occupancy_status
    expression: |
      fi.OccupancyCurrentStatusCode.map({
        "1": "BORROWER_OCCUPIED",      
        "2": "BORROWER_OCCUPIED",
        "3": "TENANT_OCCUPIED",
        "8": "TENANT_OCCUPIED",        
        "4": "VACANT",
        "5": "VACANT",
        "0": "UNKNOWN",
        "6": "UNKNOWN",
        "7": "UNKNOWN",
        "9": "UNKNOWN" 
      }).fillna("UNKNOWN")
    transform: expression
    dtype: string

  - target_column: property_occupants_type
    expression: |
      fi.OccupancyCurrentStatusCode.map({
        "1": "ALL_HOMEOWNERS_ON_ACCOUNT",
        "2": "ALL_HOMEOWNERS_ON_ACCOUNT",
        "8": "RENTER",
        "4": "UNKNOWN",
        "5": "UNKNOWN",
        "0": "UNKNOWN",
        "6": "UNKNOWN",
        "7": "UNKNOWN",
        "9": "UNKNOWN"
      }).fillna("UNKNOWN")
    transform: expression
    dtype: string

  - target_column: verified_incomplete_date
    source: s.ActualCompletionDate_L11
    transform: identity
    dtype: date

  # - target_column: source
  #   source: []
  #   transform: null
  #   dtype: string

  - target_column: status
    expression: |
      dw.LossMitStatusCode.map({
        "C": "COMPLETE",
        "R": "EXPIRED",
        "A": "COMPLETE",
      })
    transform: expression
    dtype: string

  # - target_column: status
  #   expression: |
  #     np.select(
  #       condlist=[
  #         s.ActualCompletionDate_L14.notna(),
  #         (
  #           (s.ActualCompletionDate_L01.notna() | s.ScheduledCompletionDate_L01.notna())
  #             & s.ActualCompletionDate_L11.notna()
  #             & s.ActualCompletionDate_L14.isna()
  #             & (fi.LoanLossMitStatusCode == "R")
  #           ),
  #         s.ActualCompletionDate_L11.notna(),
  #         (
  #           (s.ActualCompletionDate_L01.notna() | s.ScheduledCompletionDate_L01.notna())
  #           & (s.ActualCompletionDate_L14.notna() | s.ActualCompletionDate_L16.notna())
  #         )
  #       ],
  #       choicelist=[
  #           "COMPLETE",
  #           "EXPIRED",
  #           "INCOMPLETE",
  #           "IN_REVIEW"
  #       ],
  #       default=pd.NA
  #     )
  #   transform: expression
  #   dtype: string

  - target_column: received_date
    expression: s.ActualCompletionDate_L01.fillna(s.ScheduledCompletionDate_L01)
    transform: expression
    dtype: date

  # - target_column: hardship_started_date
  #   source: []
  #   transform: null
  #   dtype: date

  # - target_column: hardship_ended_date
  #   source: []
  #   transform: null
  #   dtype: date

  # - target_column: hardship_duration_type
  #   source: []
  #   transform: null
  #   dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "loss_mitigation_application"
  entity_id_col: "loss_mitigation_application_id"
  loan_id_col: "loan_id"
  loan_id_col_required: true