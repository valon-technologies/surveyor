table: initial_freddie_mas_balance
version: 1
primary_key: [initial_freddie_mas_balance_id]

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
    filters:
      - column: "InvestorId"
        operator: "eq"
        value: "HN1"
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left

columns:
  - target_column: initial_freddie_mas_balance_id
    hash_columns: ["li.LoanNumber", "initial_freddie_mas_balance"]
    transform: hash_id
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

  - target_column: cycle_ending_mas_balance
    source: {literal: 300.0}
    transform: literal
    dtype: float

  - target_column: balance_date
    source: {literal: "2026-01-31"}
    transform: literal
    dtype: date

