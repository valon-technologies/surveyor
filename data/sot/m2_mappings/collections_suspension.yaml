table: collections_suspension
version: 1
primary_key: [collections_suspension_id]

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left

columns:
  - target_column: collections_suspension_id
    hash_columns: ["li.LoanNumber", "l.loan_id", "COLLECTIONS_SUSPENSION"]
    transform: hash_id
    dtype: string

  - target_column: paused_date
    source: []
    transform: null
    dtype: date

  - target_column: resumed_date
    source: []
    transform: null
    dtype: date

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "collections_suspension"
  entity_id_col: "collections_suspension_id"
  loan_id_col: "loan_id"
  loan_id_col_required: true