table: property_insurance_company
version: 1
primary_key: [property_insurance_company_id]

sources:
  - name: HazardInsurance
    alias: hi
    pipe_file: {table: "HazardInsurance"}
    filters:
      - column: ['LoanNumber', 'HazardInsCompanyCode']
        operator: "dedup"
        keep: "last"
      - column: "HazardPolicyNumber"
        operator: "is_not_null"
      - column: "HazardInsCompanyCode"
        operator: "not_in"
        value: ["NOCOV", "GAPCN", "FLINH", "INMIS", "FLGAP", "RSTRT", "CYCLE", "7WAIV", "NRNWL", "66666", "77777", "CANCO", "CANIR", "CANNP", "CANUK", "TLOSS", 'UPV00']
  - name: Payee
    alias: p
    pipe_file: {table: "Payee"}
    filters:
      - column: "PayeeId"
        operator: "dedup"
        keep: "last"
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: address_staging
    alias: a
    staging: {table: "address_pi"}

joins:
  - left: {source: hi}
    right: {source: p}
    "on": ["hi.HazardInsCompanyCode == p.PayeeId"]
    how: left
  - left: {source: hi}
    right: {source: l}
    "on": ["hi.LoanNumber == l.loan_number"]
    how: left
  - left: {source: hi}
    right: {source: a}
    "on": 
      - "l.loan_id == a.loan_id"
      - "hi.HazardInsCompanyCode == a.payeeid"
    how: left

columns:
  - target_column: property_insurance_company_id
    hash_columns: ["p.PayeeId", "property_insurance_company"]
    transform: hash_id
    dtype: string

  - target_column: address_id
    source: a.address_id
    transform: identity
    dtype: string

  - target_column: name
    source: p.PayeeAddressLine1
    transform: identity
    dtype: string

  - target_column: vendor_payee_code
    source: hi.HazardInsCompanyCode
    transform: identity
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string
  
entity:
  entity_type: "property_insurance_company"
  entity_id_col: "property_insurance_company_id"
  loan_id_col: "loan_id"
  loan_id_col_required: false
