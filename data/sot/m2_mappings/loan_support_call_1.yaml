  - target_column: skill_name
    source: lsc.skill_name
    transform: identity
    dtype: string

  - target_column: talk_time_in_seconds
    source: lsc.talk_time_in_seconds
    transform: identity
    dtype: int

  - target_column: agent_user_id
    source: lsc.agent_user_id
    transform: identity
    dtype: string

  - target_column: loan_id
