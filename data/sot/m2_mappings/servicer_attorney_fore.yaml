table: servicer_attorney_fore
version: 1
primary_key: [servicer_attorney_id]

sources:
  - name: DefaultWorkstations
    alias: dw
    pipe_file: {table: "DefaultWorkstations"}
    filters:
      - column: "FcStatusCode"
        operator: "is_not_null"
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: Payee
    alias: p
    pipe_file: {table: "Payee"}
  - name: servicer_law_firm_fore
    alias: slff
    staging: {table: "servicer_law_firm_fore"}

joins:
  - left: {source: dw}
    right: {source: l}
    "on": ["dw.LoanNumber == l.loan_number"]
    how: left
  - left: {source: dw}
    right: {source: p}
    "on": ["dw.FcAttorneyPayeeId == p.PayeeId"]
    how: left
  - left: {source: dw}
    right: {source: slff}
    "on": 
      - "dw.FcAttorneyPayeeId == slff.FcAttorneyPayeeId"
      - "l.loan_id == slff.loan_id"
    how: left

columns:
  - target_column: servicer_attorney_id
    hash_columns: ["dw.FcAttorneyPayeeId", "dw.LoanNumber", "servicer_attorney_fore"]
    transform: hash_id
    dtype: string

  - target_column: email
    expression: |
      p.PayeeEmailAddress.fillna('servicer_attorney_fore@valon.com')
    transform: expression
    dtype: string

  - target_column: name
    expression: |
      p.PayeeAddressLine1 + " " + "Attorney"
    transform: expression
    dtype: string

  - target_column: servicer_law_firm_id
    source: slff.servicer_law_firm_id
    transform: identity
    dtype: string
   
  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string
  
  - target_column: FcAttorneyPayeeId
    source: dw.FcAttorneyPayeeId
    transform: identity
    dtype: string