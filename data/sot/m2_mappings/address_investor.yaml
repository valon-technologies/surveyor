table: address_investor
version: 1

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
  - name: Investor
    alias: iv
    pipe_file: {table: "Investor"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: iv}
    right: {source: li}
    "on": 
      - "iv.InvestorId == li.InvestorId"
      - "iv.CategoryCode == li.CategoryCode"
    how: left
  - left: {source: iv}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left

columns:
  - target_column: address_id
    expression: |
      hash_address_id(
        "ACDC",
        iv.InvestorAddressLine2.str.strip(),
        iv.InvestorAddressLine3.str.strip(), 
        iv.InvestorAddressLine4.str.split(",", n=1).str[0].str.strip(), 
        iv.InvestorAddressLine4.str.split(",", n=1).str[1].str.strip().str.split(" ").str[0], 
        iv.InvestorAddressLine4.str.split(",", n=1).str[1].str.strip().str.split(" ").str[-1].fillna('').astype(str).str.replace('nan', '').str.slice(0, 5).str.zfill(5).replace('00000', '').str.strip()
      )
    transform: expression
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

  - target_column: city
    expression: iv.InvestorAddressLine4.str.split(",", n=1).str[0].str.strip()
    transform: expression
    dtype: string

  - target_column: county
    source: []
    transform: null
    dtype: string

  - target_column: state
    expression: iv.InvestorAddressLine4.str.split(",", n=1).str[1].str.strip().str.split(" ").str[0]
    transform: expression
    dtype: string

  - target_column: street_address_1
    expression: iv.InvestorAddressLine3.str.strip()
    transform: expression
    dtype: string

  - target_column: street_address_2
    source: []
    transform: null
    dtype: string

  - target_column: zip_code
    expression: iv.InvestorAddressLine4.str.split(",", n=1).str[1].str.strip().str.split(" ").str[-1].fillna('').astype(str).str.replace('nan', '').str.zfill(5).replace('00000', '').str.strip()
    transform: expression
    dtype: string