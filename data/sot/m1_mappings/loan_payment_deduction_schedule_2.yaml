table: loan_payment_deduction_schedule_2
version: 1
primary_key: [loan_payment_deduction_schedule_id]

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
  - name: EventDates
    alias: ed
    pipe_file: {table: "EventDates"}
  - name: StopsFlagsAndIndicators
    alias: fi
    pipe_file: {table: "StopsFlagsAndIndicators"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: loan_payment_deduction_schedule_1
    alias: lps1
    staging: {table: "loan_payment_deduction_schedule_1"}

joins:
  - left: {source: li}
    right: {source: ed}
    "on": ["li.LoanNumber == ed.LoanNumber"]
    how: left
  - left: {source: li}
    right: {source: fi}
    "on": ["li.LoanNumber == fi.LoanNumber"]
    how: left
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left
  - left: {source: li}
    right: {source: lps1}
    "on": ["l.loan_id == lps1.loan_id"]
    how: inner

columns:
  - target_column: loan_payment_deduction_schedule_id
    hash_columns: ["li.LoanNumber", "l.loan_id", "lps1.loan_payment_deduction_schedule_id", "loan_payment_deduction_schedule"]
    transform: hash_id
    dtype: string

  - target_column: deduction_amount
    source: li.PaymentSubsidyAmount2
    transform: identity
    dtype: float

  - target_column: deduction_type
    expression: fi.SubsidySourceCode.fillna(li.BuydownType)
    transform: expression
    dtype: string

  - target_column: first_due_date
    expression: |
      date_add(lps1.first_due_date, li.SubsidyPeriod1Term, "month")
    transform: expression
    dtype: date

  - target_column: last_due_date
    expression: |
      date_add(
        date_add(
          date_add(lps1.first_due_date, li.SubsidyPeriod1Term, "month"),
          li.SubsidyPeriod2Term,
          "month"
          ),
        -1,
        "month"
      )
    transform: expression
    dtype: date

  - target_column: payment_frequency
    source: {literal: "MONTHLY"}
    transform: literal
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string
