    alias: ltl12
    staging: {table: "loan_tax_line_12"}
  - name: loan_tax_line_6
    alias: ltl6
    staging: {table: "loan_tax_line_6"}
  - name: loan_tax_line_3
    alias: ltl3
    staging: {table: "loan_tax_line_3"}
  - name: loan_tax_line_4
    alias: ltl4
    staging: {table: "loan_tax_line_4"}

concat:
