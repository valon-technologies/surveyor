    source: loan_tax_line_id
    transform: identity
    dtype: string

  - target_column: loan_tax_parcel_id
    source: loan_tax_parcel_id
    transform: identity
    dtype: string

  - target_column: tax_authority_id
    source: tax_authority_id
    transform: identity
    dtype: string

  - target_column: installment_amount_1
    source: installment_amount_1
    transform: identity
    dtype: float

  - target_column: installment_amount_2
    source: installment_amount_2
    transform: identity
    dtype: float

  - target_column: installment_amount_3
    source: installment_amount_3
    transform: identity
    dtype: float

  - target_column: installment_amount_4
    source: installment_amount_4
    transform: identity
    dtype: float

  - target_column: status
    source: status
    transform: identity
    dtype: string

  - target_column: loan_id
    source: loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "loan_tax_line"
  entity_id_col: "loan_tax_line_id"
  loan_id_col: "loan_id"
  loan_id_col_required: true

