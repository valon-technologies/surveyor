table: portfolio_to_bank_account
version: 1
primary_key: [portfolio_to_bank_account_id]

sources:
  - name: portfolio_staging
    alias: p
    staging: {table: "portfolio"}
  # - name: bank_account_staging
  #   alias: ba
  #   staging: {table: "bank_account"}

# joins:
#   - left: {source: p}
#     right: {source: ba}
#     "on": ["p.loan_id == ba.loan_id"]
#     how: left

columns:
  - target_column: portfolio_to_bank_account_id
    hash_columns: ["p.portfolio_id", "portfolio_to_bank_account"]
    transform: hash_id
    dtype: string

  - target_column: portfolio_id
    source: []
    transform: null
    dtype: string

  - target_column: bank_account_id
    source: []
    transform: null
    dtype: string

  - target_column: loan_id
    source: p.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "portfolio_to_bank_account"
  entity_id_col: "portfolio_to_bank_account_id"
  loan_id_col: "loan_id"
  loan_id_col_required: false
