table: address_billing
version: 1

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left
  
columns:
  - target_column: address_id
    expression: |
      hash_address_id(
        "ACDC",
        li.BillingAddressLine4.str.strip(),
        li.BillingAddressLine3.str.strip(), 
        li.BillingCityName.str.strip(), 
        li.BillingState.str.strip(), 
        li.BillingZipCode.fillna('').astype(str).str.replace('nan', '').str.slice(0, 5).str.zfill(5).replace('00000', '').str.strip()
      )
    transform: expression
    dtype: string
    
  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

  - target_column: city
    expression: li.BillingCityName.str.strip()
    transform: expression
    dtype: string

  - target_column: county
    source: []
    transform: null
    dtype: string

  - target_column: state
    expression: li.BillingState.str.strip()
    transform: expression
    dtype: string

  - target_column: street_address_1
    expression: li.BillingAddressLine4.str.strip()
    transform: expression
    dtype: string

  - target_column: street_address_2
    expression: li.BillingAddressLine3.str.strip()
    transform: expression
    dtype: string

  - target_column: zip_code
    expression: li.BillingZipCode.fillna('').astype(str).str.replace('nan', '').str.slice(0, 5).str.zfill(5).replace('00000', '').str.strip()
    transform: expression
    dtype: string