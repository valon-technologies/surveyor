table: notification_sms_detail
version: 1
primary_key: [notification_sms_detail_id]

sources:
  - name: notification_staging
    alias: n
    staging: {table: "notification_1"}
    dtypes:
      MspEffectiveDate: "date"
      LetterDate: "date"
      LetterVersionNumber: "float"
      LetterRecordNumber: "float"
    filters:
      - column: "delivery_method"
        operator: "eq"
        value: "SMS"
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: borrower_to_loan_staging
    alias: btl
    staging: {table: "borrower_to_loan"}
    filters:
      - column: "is_primary"
        operator: "eq"
        value: "True"
  - name: borrower_phone_number_staging
    alias: bpn
    staging: {table: "borrower_phone_number"}

joins:
  - left: {source: n}
    right: {source: l}
    "on": ["n.loan_id == l.loan_id"]
    how: left
  - left: {source: n}
    right: {source: btl}
    "on": ["n.loan_id == btl.loan_id"]
    how: left
  - left: {source: n}
    right: {source: bpn}
    "on": ["btl.borrower_id == bpn.borrower_id"]
    how: left

columns:
  - target_column: notification_sms_detail_id
    hash_columns: ["l.loan_id", "n.notification_id", "n.MspEffectiveDate", "n.LetterDate", "n.LetterId", "n.LetterRecordNumber", "notification_sms_detail"]
    transform: hash_id
    dtype: string

  - target_column: message
    source: n.LetterDescription
    transform: identity
    dtype: string

  - target_column: sent_at
    source: n.LetterDate
    transform: identity
    dtype: datetime

  - target_column: to_phone_number
    source: bpn.phone_number
    transform: identity
    dtype: string

  - target_column: notification_id
    source: n.notification_id
    transform: identity
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "notification_sms_detail"
  entity_id_col: "notification_sms_detail_id"
  loan_id_col: "loan_id"
  loan_id_col_required: false
