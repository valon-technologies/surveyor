table: servicer_law_firm_bank
version: 1
primary_key: [servicer_law_firm_id]

sources:
  - name: DefaultWorkstations
    alias: dw
    pipe_file: {table: "DefaultWorkstations"}
    filters:
      - column: "BankruptcyCaseNumber"
        operator: "is_not_null"
  - name: Payee
    alias: p
    pipe_file: {table: "Payee"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: dw}
    right: {source: l}
    "on": ["dw.LoanNumber == l.loan_number"]
    how: left
  - left: {source: dw}
    right: {source: p}
    "on": ["dw.BankruptcyMortgageeAttorneyId == p.PayeeId"]
    how: left

columns:
  - target_column: servicer_law_firm_id
    expression: | 
      hash_servicer_law_firm_id(
        "ACDC",
        p.PayeeAddressLine1
      )
    transform: expression
    dtype: string

  - target_column: name
    source: p.PayeeAddressLine1
    transform: identity
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

  - target_column: BankruptcyMortgageeAttorneyId
    source: dw.BankruptcyMortgageeAttorneyId
    transform: identity
    dtype: string
