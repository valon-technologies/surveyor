table: loss_mitigation_application_document
version: 1
primary_key: [loss_mitigation_application_document_id]

sources:
sources:
  - name: Step
    alias: s
    pipe_file: {table: "Step"}
    filters:
      - column: "Workstation"
        operator: "eq"
        value: "LSMT"
    pivot:
      pivot_index: ["LoanNumber"]
      pivot_columns: ["StepCode"]
      pivot_values: ["ActualCompletionDate", "ScheduledCompletionDate"]
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: s}
    right: {source: l}
    "on": ["s.LoanNumber == l.loan_number"]
    how: left

columns:
  - target_column: loss_mitigation_application_document_id
    hash_columns: ["l.loan_id", "s.ScheduledCompletionDate_L01", "s.ActualCompletionDate_L01", "loss_mitigation_application_document"]
    transform: hash_id
    dtype: string

  - target_column: received_date
    expression: s.ActualCompletionDate_L01.fillna(s.ScheduledCompletionDate_L01)
    transform: expression
    dtype: date

  # - target_column: processing_review_status
  #   source: []
  #   transform: null
  #   dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "loss_mitigation_application_document"
  entity_id_col: "loss_mitigation_application_document_id"
  loan_id_col: "loan_id"
  loan_id_col_required: false