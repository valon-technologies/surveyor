table: address_mi
version: 1

sources:
  - name: LoanInfo 
    alias: li
    pipe_file: {table: "LoanInfo"}
    filters:
      - column: "MiCertificateNumberExp"
        operator: "is_not_null"
  - name: Payee
    alias: p
    pipe_file: {table: "Payee"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: li}
    right: {source: p}
    "on": ["li.MiCompanyCodeExp == p.PayeeId"]
    how: left
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left
  
columns:
  - target_column: address_id
    expression: |
      hash_address_id(
        "ACDC",
        p.PayeeAddressLine2.str.strip(),
        p.PayeeAddressLine3.str.strip(), 
        p.PayeeAddressLine4.str.rsplit(pat=" ", n=1).str[0].str.strip(), 
        p.PayeeAddressLine4.str.rsplit(pat=" ", n=1).str[1].str.strip(), 
        p.PayeeAddressZipCode.fillna('').astype(str).str.replace('nan', '').str.slice(0, 5).str.zfill(5).replace('00000', '').str.strip()
      )
    transform: expression
    dtype: string
    
  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

  - target_column: city
    expression: p.PayeeAddressLine4.str.rsplit(pat=" ", n=1).str[0].str.strip()
    transform: expression
    dtype: string

  - target_column: county
    source: []
    transform: null
    dtype: string

  - target_column: state
    expression: p.PayeeAddressLine4.str.rsplit(pat=" ", n=1).str[1].str.strip()
    transform: expression
    dtype: string

  - target_column: street_address_1
    expression: p.PayeeAddressLine2.str.strip().fillna(p.PayeeAddressLine3.str.strip())
    transform: expression
    dtype: string

  - target_column: street_address_2
    expression: p.PayeeAddressLine3.str.strip()
    transform: expression
    dtype: string

  - target_column: zip_code
    expression: p.PayeeAddressZipCode.fillna('').astype(str).str.replace('nan', '').str.slice(0, 5).str.zfill(5).replace('00000', '').str.strip()
    transform: expression
    dtype: string
  
  - target_column: payeeid
    source: p.PayeeId
    transform: identity
    dtype: string