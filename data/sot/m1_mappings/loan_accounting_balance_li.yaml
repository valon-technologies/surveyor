table: loan_accounting_balance_li
version: 1
primary_key: [loan_accounting_balance_id]

sources:
  - name: loan_accounting_balance_ts
    alias: ts
    staging: {table: "loan_accounting_balance_ts"}
    dtypes:
      sequence_num: "int"
    sorting:
      - column: "sequence_num"
        ascending: true
    filters:
      - column: "loan_id"
        operator: "dedup"
        keep: "last"
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: EventDates 
    alias: ed
    pipe_file: {table: "EventDates"}
  # - name: S2MR
  #   alias: s2mr
  #   pipe_file: {table: "S2MR"}
  #   dtypes:
  #     DueDate: "date"
  #   sorting:
  #     - column: "DueDate"
  #       ascending: true
  #   filters:
  #     - column: "RP"
  #       operator: "eq"
  #       value: "4"
  #     - column: "ST"
  #       operator: "eq"
  #       value: "K"
  #     - column: "LoanNumber"
  #       operator: "dedup"
  #       keep: "last"

joins:
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left
  - left: {source: li}
    right: {source: ts}
    "on": ["l.loan_id == ts.loan_id"]
    how: left
  - left: {source: li}
    right: {source: ed}
    "on": ["li.LoanNumber == ed.LoanNumber"]
    how: left
  # - left: {source: li}
  #   right: {source: s2mr}
  #   "on": ["li.LoanNumber == s2mr.LoanNumber"]
  #   how: left

columns:
  - target_column: loan_accounting_balance_id
    hash_columns: ["li.LoanNumber", "l.loan_id", "loan_accounting_balance_DTD"]
    transform: hash_id
    dtype: string

  - target_column: action_datetime
    expression: |
      date_add(l.data_transfer_effective_date, -1, "day")
    transform: expression
    dtype: datetime

  - target_column: event_type
    source: {literal: "DTD_TRANSFER_BALANCE_SNAPSHOT"}
    transform: literal
    dtype: string

  - target_column: event_subtype
    source: []
    transform: null
    dtype: string

  - target_column: modification_type
    source: []
    transform: null
    dtype: string

  - target_column: date_effective
    expression: |
      date_add(l.data_transfer_effective_date, -1, "day")
    transform: expression
    dtype: date

  - target_column: date_paid_through
    expression: |
      date_add(ed.NextPaymentDueDate, -1, "month")
    transform: expression
    dtype: date

  - target_column: deferred_principal_balance
    expression: li.SecondPrincipalBalance.fillna(li.SecondPrincipalForbBalance).fillna(0.0)
    transform: expression
    dtype: float

  - target_column: deferred_principal_balance_delta
    expression: | 
      pd.to_numeric(li.SecondPrincipalBalance.fillna(li.SecondPrincipalForbBalance).fillna(0.0), errors="coerce").round(2) - pd.to_numeric(ts.deferred_principal_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: escrow_client_advance_balance
    source: li.EscrowAdvanceBalance
    transform: identity
    dtype: float

  - target_column: escrow_client_advance_balance_delta
    expression: |
      pd.to_numeric(li.EscrowAdvanceBalance, errors="coerce").round(2) - pd.to_numeric(ts.escrow_client_advance_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: escrow_holding_balance
    expression: |
      pd.to_numeric(li.EscrowBalance, errors="coerce") - pd.to_numeric(li.EscrowAdvanceBalance, errors="coerce")
    transform: expression
    dtype: float
  
  - target_column: escrow_holding_balance_delta
    expression: | 
      pd.to_numeric(li.EscrowBalance, errors="coerce").round(2) - pd.to_numeric(li.EscrowAdvanceBalance, errors="coerce").round(2) - pd.to_numeric(ts.escrow_holding_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: escrow_interest_accrued_balance
    expression: pd.to_numeric(li.IoeCurrentAccrualAmount, errors="coerce") + pd.to_numeric(ts.escrow_interest_accrued_balance, errors="coerce")
    transform: expression
    dtype: float

  - target_column: escrow_interest_accrued_balance_delta
    source: li.IoeCurrentAccrualAmount
    transform: identity
    dtype: float

  - target_column: fee_late_balance
    expression: pd.to_numeric(li.AccruedLateChargeAmount, errors="coerce")
    transform: expression
    dtype: float

  - target_column: fee_late_balance_delta
    expression: |
      pd.to_numeric(li.AccruedLateChargeAmount, errors="coerce").round(2) - pd.to_numeric(ts.fee_late_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: fee_nsf_balance
    source: li.NsfFeeBalance
    transform: identity
    dtype: float

  - target_column: fee_nsf_balance_delta
    expression: |
      pd.to_numeric(li.NsfFeeBalance, errors="coerce").round(2) - pd.to_numeric(ts.fee_nsf_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: fee_other_balance
    expression: pd.to_numeric(li.CollectOtherFeesDueAmount, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: fee_other_balance_delta
    expression: |
      pd.to_numeric(li.CollectOtherFeesDueAmount, errors="coerce").round(2) - pd.to_numeric(ts.fee_other_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: gse_servicing_strip_fee_expense_balance_delta
    source: {literal: 0.0}
    transform: literal
    dtype: float

  - target_column: interest_bearing_principal_balance
    source: li.FirstPrincipalBalance
    transform: identity
    dtype: float

  - target_column: interest_bearing_principal_balance_delta
    expression: |
      pd.to_numeric(li.FirstPrincipalBalance, errors="coerce").round(2) - pd.to_numeric(ts.interest_bearing_principal_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: interest_holding_balance_delta
    source: {literal: 0.0}
    transform: literal
    dtype: float

  - target_column: interest_expense_paid
    source: ts.interest_expense_paid
    transform: identity
    dtype: float

  - target_column: interest_expense_paid_delta
    source: {literal: 0.0}
    transform: literal
    dtype: float

  - target_column: interest_rate_buydown_holding_balance
    source: li.EscrowReplaceResrvBalance
    transform: identity
    dtype: float

  - target_column: loss_draft_holding_balance
    source: li.RestrictedEscrowBalance
    transform: identity
    dtype: float

  - target_column: loss_draft_interest_accrued_balance
    source: ts.loss_draft_interest_accrued_balance
    transform: identity
    dtype: float

  - target_column: loss_mitigation_modified_date_paid_through
    source: []
    transform: null
    dtype: date
    # source: s2mr.DueDate
    # transform: identity
    # dtype: date

  - target_column: non_recoverable_advance_balance
    source: li.NonRecCorpAdvanceBalance
    transform: identity
    dtype: float

  - target_column: non_recoverable_advance_balance_delta
    expression: |
      pd.to_numeric(li.NonRecCorpAdvanceBalance, errors="coerce").round(2) - pd.to_numeric(ts.non_recoverable_advance_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: recoverable_servicing_advance_balance
    source: li.RecoverCorpAdvanceBalance
    transform: identity
    dtype: float

  - target_column: recoverable_servicing_advance_balance_delta
    expression: pd.to_numeric(li.RecoverCorpAdvanceBalance, errors="coerce").round(2) - pd.to_numeric(ts.recoverable_servicing_advance_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: suspense_holding_balance
    source: li.SuspenseBalance
    transform: identity
    dtype: float

  - target_column: suspense_holding_balance_delta
    expression: |
      pd.to_numeric(li.SuspenseBalance, errors="coerce").round(2) - pd.to_numeric(ts.suspense_holding_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: third_party_advance_balance
    source: li.ThirdPartyRecoverableCaBal
    transform: identity
    dtype: float
  
  - target_column: third_party_advance_balance_delta
    expression: |
      pd.to_numeric(li.ThirdPartyRecoverableCaBal, errors="coerce").round(2) - pd.to_numeric(ts.third_party_advance_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: unpaid_principal_balance
    expression: pd.to_numeric(li.FirstPrincipalBalance, errors="coerce") + pd.to_numeric(li.SecondPrincipalBalance.fillna(li.SecondPrincipalForbBalance).fillna(0.0), errors="coerce")
    transform: expression
    dtype: float

  - target_column: unpaid_principal_balance_delta
    expression: |
      pd.to_numeric(li.FirstPrincipalBalance, errors="coerce").round(2) + pd.to_numeric(li.SecondPrincipalBalance.fillna(li.SecondPrincipalForbBalance).fillna(0.0), errors="coerce").round(2) - pd.to_numeric(ts.unpaid_principal_balance, errors="coerce").round(2)
    transform: expression
    dtype: float

  - target_column: sequence_num
    expression: pd.to_numeric(ts.sequence_num, errors="coerce") + 1
    transform: expression
    dtype: int

  - target_column: servicing_activity_id
    source: ts.servicing_activity_id
    transform: identity
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string
  


  



  

  


  




