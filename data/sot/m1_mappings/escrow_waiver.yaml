table: escrow_waiver
version: 1
primary_key: [escrow_waiver_id]

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
    dtypes:
      TAndIMonthlyAmount: "float"
      MiMonthlyAmount: "float"
      PendingTAndIMonthlyAmount: "float"
    filters:
      - operator: "expression"
        expression: "((df['TAndIMonthlyAmount'].fillna(0) != 0) | (df['MiMonthlyAmount'].fillna(0) != 0) | ((df['PendingTAndIMonthlyAmount'].fillna(0) != 0) & (df['TAndIMonthlyAmount'].fillna(0) == 0)) | (df['LoanNumber'] == '1411100436'))"
  - name: EventDates
    alias: ed
    pipe_file: {table: "EventDates"}
    filters:
      - column: "EscrowWaiverDate"
        operator: "is_not_null"
  - name: loan_staging
    alias: l
    staging: {table: "loan"}

joins:
  - left: {source: ed}
    right: {source: li}
    "on": ["ed.LoanNumber == li.LoanNumber"]
    how: inner
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left

columns:
  - target_column: escrow_waiver_id
    hash_columns: ["ed.LoanNumber", "l.loan_id", "ed.EscrowWaiverDate", "escrow_waiver"]
    transform: hash_id
    dtype: string

  - target_column: effective_date
    source: ed.EscrowWaiverDate
    transform: identity
    dtype: date

  - target_column: status
    expression: | 
      li.EscrowWaiverCode.map({
        "01": "CLOSED",
        "02": "CLOSED",
        "03": "CLOSED",
        "04": "COMPLETED",
        "05": "COMPLETED",
        "06": "COMPLETED",
        "07": "COMPLETED",
        "08": "CLOSED",
        "09": "CLOSED",
      }).fillna("COMPLETED")
    transform: expression
    dtype: string

  - target_column: waiver_type
    source: {literal: "FULL"}
    transform: literal
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "escrow_waiver"
  entity_id_col: "escrow_waiver_id"
  loan_id_col: "loan_id"
  loan_id_col_required: true

