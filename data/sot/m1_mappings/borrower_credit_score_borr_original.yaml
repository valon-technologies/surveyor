table: borrower_credit_score_borr_original
version: 1
primary_key: [borrower_credit_score_id]

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
    dtypes:
      CsBorrOriginalCreditQltyCode: "int"
    filters:
      - column: "CsBorrOriginalCreditQltyCode"
        operator: "is_not_null"
      - column: "CsBorrOriginalCreditQltyCode"
        operator: "neq"
        value: 0
      - column: "CsBorrOriginalCreditQltyCode"
        operator: "neq"
        value: 9999
      - column: "CsBorrOriginalCreditQltyCode"
        operator: "neq"
        value: 7777
  - name: EventDates
    alias: ed
    pipe_file: {table: "EventDates"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: borrower_to_loan_staging
    alias: btl
    staging: {table: "borrower_to_loan"}
    filters:
      - column: "is_primary"
        operator: "eq"
        value: "True"

joins:
  - left: {source: btl}
    right: {source: l}
    "on": ["btl.loan_id == l.loan_id"]
    how: left
  - left: {source: btl}
    right: {source: li}
    "on": ["l.loan_number == li.LoanNumber"]
    how: inner
  - left: {source: btl}
    right: {source: ed}
    "on": ["li.LoanNumber == ed.LoanNumber"]
    how: left

columns:
  - target_column: borrower_credit_score_id
    hash_columns: ["btl.borrower_id", "l.loan_id", "borrower_credit_score_borr_original"]
    transform: hash_id
    dtype: string

  - target_column: borrower_id
    source: btl.borrower_id
    transform: identity
    dtype: string

  - target_column: credit_score
    source: li.CsBorrOriginalCreditQltyCode
    transform: identity
    dtype: int

  - target_column: credit_scoring_model
    source: {literal: "FICO"}
    transform: literal
    dtype: string

  - target_column: retrieved_date
    source: li.LoanClosingDate
    transform: identity
    dtype: date

  - target_column: source_type
    source: {literal: "ORIGINATION"}
    transform: literal
    dtype: string

  - target_column: loan_id
    source: btl.loan_id
    transform: identity
    dtype: string