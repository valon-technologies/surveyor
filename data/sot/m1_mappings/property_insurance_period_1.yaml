table: property_insurance_period_1
version: 1
primary_key: [property_insurance_period_id]

sources:
  - name: HazardInsurance
    alias: hi
    pipe_file: {table: "HazardInsurance"}
    dtypes:
      HazardDisbursementDueDate: "date"
      HazardExpirationDate: "date"
      HazardTerm: "float"
      RecordStartDate: "date"
    sorting:
      - column: "RecordStartDate"
        ascending: True
    filters:
      - column: "HazardInsCompanyCode"
        operator: "not_in"
        value: ["NOCOV", "GAPCN", "FLINH", "INMIS", "FLGAP", "RSTRT", "CYCLE"]
      - column: ["LoanNumber", "HazardDisbursementType", "HazardDisbursementDueDate"]
        operator: "dedup"
        keep: "last" 
    computed_columns:
      - column: "PolicyStartDate"
        expression: |
          pd.to_datetime(df.HazardExpirationDate, errors="coerce") - pd.to_numeric(df.HazardTerm, errors="coerce").apply(lambda x: pd.DateOffset(months=np.int64(x)) if pd.notna(x) else pd.NaT)
    lead_columns:
      columns: ["PolicyStartDate"]
      group_by: ["LoanNumber", "HazardDisbursementType"] 
      order_by: ["RecordStartDate"]  
      fillna: None
      dtype: "date"
      order_ascending: True 
      suffix: "_lead1"
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: property_insurance_company_staging
    alias: pic
    staging: {table: "property_insurance_company"}
  - name: escrow_loan_info_staging
    alias: eli
    staging: {table: "escrow_loan_info"}

joins:
  - left: {source: hi}
    right: {source: l}
    "on": ["hi.LoanNumber == l.loan_number"]
    how: left
  - left: {source: hi}
    right: {source: pic}
    "on": 
      - "l.loan_id == pic.loan_id"
      - "hi.HazardInsCompanyCode == pic.vendor_payee_code"
    how: left
  - left: {source: hi}
    right: {source: eli}
    "on": ["l.loan_id == eli.loan_id"]
    how: left

post_merge_filters:
  - operator: "expression"
    expression: "~((df['escrow_loan_info_id'].isnull()) & (df['HazardTypeOfPaymentCode'].isin(['1','2','3','4','5','6'])))"

columns:
  - target_column: property_insurance_period_id
    hash_columns: ["hi.LoanNumber", "hi.HazardDisbursementType", "hi.HazardSequenceNumber", "hi.HazardDisbursementDueDate", "l.loan_id", "pic.property_insurance_company_id", "property_insurance_period"]
    transform: hash_id
    dtype: string

  - target_column: amount_coverage
    source: hi.HazardCoverageAmount
    transform: identity
    dtype: float

  - target_column: amount_deductible
    source: hi.HazardDeductibleAmount
    transform: identity
    dtype: float

  - target_column: amount_premium
    source: hi.HazardDisbursementAmount
    transform: identity
    dtype: float

  - target_column: archived_at
    source: []
    transform: null
    dtype: datetime

  - target_column: is_force_placed
    expression: |
      hi.ForcedCoverageIndicator.map({
        "X": "False",
        "C": "False",
        "F": "True",
        "P": "False",
        "R": "False",
        "S": "False",
        "T": "False",
        "U": "False"
      }).fillna("False")
    transform: expression
    dtype: boolean

  - target_column: policy_cancelled_date
    expression: |
      np.where(
        hi.PolicyStartDate_lead1 < hi.HazardExpirationDate,
        hi.PolicyStartDate_lead1,
        pd.NA
      )
    transform: expression
    dtype: date

  - target_column: policy_end_date
    source: hi.HazardExpirationDate
    transform: identity
    dtype: date

  - target_column: policy_number
    source: hi.HazardPolicyNumber
    transform: identity
    dtype: string

  - target_column: policy_start_date
    source: hi.PolicyStartDate
    transform: identity
    dtype: date

  - target_column: property_insurance_company_id
    source: pic.property_insurance_company_id
    transform: identity
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

  - target_column: RecordStartDate
    expression: pd.to_datetime(hi.RecordStartDate, errors='coerce').dt.strftime("%Y-%m-%d")
    transform: expression
    dtype: string

  - target_column: RecordEndDate
    expression: pd.to_datetime(hi.RecordEndDate, errors='coerce').dt.strftime("%Y-%m-%d").fillna("2099-12-31")
    transform: expression
    dtype: string

  - target_column: HazardTypeOfPaymentCode
    source: hi.HazardTypeOfPaymentCode
    transform: identity
    dtype: string

  - target_column: HazardCoverageType
    source: hi.HazardCoverageType
    transform: identity
    dtype: string

  - target_column: HazardDisbursementType
    source: hi.HazardDisbursementType
    transform: identity
    dtype: string

  - target_column: HazardSequenceNumber
    source: hi.HazardSequenceNumber
    transform: identity
    dtype: string