table: loan
version: 1
primary_key: [loan_id]

sources:
  - name: loan_1
    alias: l1
    staging: {table: "loan1"}
  - name: mbs_pool_staging
    alias: mp
    staging: {table: "mbs_pool"}
  - name: servicer_company_staging
    alias: sc
    staging: {table: "servicer_company"}

joins:
  - left: {source: l1}
    right: {source: mp}
    "on": 
      - "l1.loan_id == mp.loan_id"
    how: left
  - left: {source: l1}
    right: {source: sc}
    "on": ["l1.loan_id == sc.loan_id"]
    how: left

