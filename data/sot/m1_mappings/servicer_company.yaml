table: servicer_company
version: 1
primary_key: [servicer_company_id]

sources:
  - name: LoanInfo
    alias: li
    pipe_file: {table: "LoanInfo"}
  - name: loan_staging
    alias: l
    staging: {table: "loan1"}
  - name: PriorServicer
    alias: ps
    pipe_file: {table: "PriorServicer"}
  - name: address_staging
    alias: a
    staging: {table: "address_sc"}
  
joins:
  - left: {source: li}
    right: {source: l}
    "on": ["li.LoanNumber == l.loan_number"]
    how: left
  - left: {source: li}
    right: {source: ps}
    "on": ["li.AcquisitionOrSaleIdentifier == ps.AcquisitionOrSaleIdentifier"]
    how: left
  - left: {source: li}
    right: {source: a}
    "on": ["l.loan_id == a.loan_id"]
    how: left

columns:
  - target_column: servicer_company_id
    hash_columns: ["ps.ServicerName", "servicer_company"]
    transform: hash_id
    dtype: string

  - target_column: name
    source: ps.ServicerName
    transform: identity
    dtype: string

  - target_column: address_id
    source: a.address_id
    transform: identity
    dtype: string

  - target_column: phone_number
    source: ps.PhoneNumber
    transform: identity
    dtype: string

  - target_column: loan_id
    source: l.loan_id
    transform: identity
    dtype: string

entity:
  entity_type: "servicer_company"
  entity_id_col: "servicer_company_id"
  loan_id_col: "loan_id"
  loan_id_col_required: false

