table: foreclosure
version: 1
primary_key: [foreclosure_id]

sources: 
  - name: DefaultWorkstations
    alias: dw
    pipe_file: {table: "DefaultWorkstations"}
    filters:
      - column: "FcStatusCode"
        operator: "is_not_null"
  - name: EventDates
    alias: ed
    pipe_file: {table: "EventDates"}
  - name: loan_staging
    alias: l
    staging: {table: "loan"}
  - name: property_staging
    alias: p
    staging: {table: "property"}
  - name: debtor_attorney_staging
    alias: da
    staging: {table: "debtor_attorney"}
  - name: Step
    alias: s
    pipe_file: {table: "Step"}
    filters:
      - column: "Workstation"
        operator: "eq"
        value: "FORE"
    pivot:
      pivot_index: ["LoanNumber"]
      pivot_columns: ["StepCode"]
      pivot_values: ["ActualCompletionDate", "ScheduledCompletionDate"]
  - name: property_valuation_staging
    alias: pv
    staging: {table: "property_valuation"}
    filters:
      - column: "valuation_purpose"
        operator: "in"
        value: ["EQUITY ANALYSIS", "FORECLOSURE BID INST"]
  - name: servicer_attorney_staging
    alias: sa
    staging: {table: "servicer_attorney_fore"}
    filters:
      - column: ["loan_id", "servicer_attorney_id"]
        operator: "dedup"
        keep: "last"

joins:
  - left: {source: dw}
    right: {source: l}
    "on": ["dw.LoanNumber == l.loan_number"]
    how: left
  - left: {source: dw}
    right: {source: ed}
    "on": ["dw.LoanNumber == ed.LoanNumber"]
    how: left
  - left: {source: dw}
    right: {source: p}
    "on": ["l.loan_id == p.loan_id"]
    how: left
  - left: {source: dw}
    right: {source: da}
    "on": ["l.loan_id == da.loan_id"]
    how: left
  - left: {source: dw}
    right: {source: s}
    "on": ["dw.LoanNumber == s.LoanNumber"]
    how: left
  - left: {source: dw}
    right: {source: pv}
    "on": ["l.loan_id == pv.loan_id"]
    how: left
  - left: {source: dw}
    right: {source: sa}
    "on": 
      - "l.loan_id == sa.loan_id"
      - "dw.FcAttorneyPayeeId == sa.FcAttorneyPayeeId"
    how: left

columns: 
  - target_column: foreclosure_id
    hash_columns: ["l.loan_id", "dw.LoanNumber", "foreclosure"]
    transform: hash_id
    dtype: string

  - target_column: actual_sale_date
    source: dw.FcSaleDate
    transform: identity
    dtype: date

  # - target_column: adr_scheduled_sale_report_date
  #   source: []
  #   transform: null
  #   dtype: date

  # - target_column: assignment_recording_date
  #   source: []
  #   transform: null
  #   dtype: date

  # - target_column:  auction_firm_email
  #   source: []
  #   transform: null
  #   dtype: string

  # - target_column: auction_firm_name
  #   source: []
  #   transform: null
  #   dtype: string

  # - target_column: auction_firm_phone_number
  #   source: []
